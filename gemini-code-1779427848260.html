<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>최종 AED 최적 배치 분석기</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .controls { background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; display: flex; gap: 15px; align-items: center; }
        canvas { border: 2px solid #333; margin-top: 10px; max-width: 100%; }
    </style>
</head>
<body>
    <h1>🚑 지능형 AED 배치 분석기</h1>
    <div class="controls">
        <input type="file" id="imageInput" accept="image/*">
        <label>AED 개수: <input type="number" id="aedCount" value="3" min="1" max="10"></label>
        <button id="runBtn" style="padding: 10px 20px; cursor: pointer;">분석 시작</button>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        document.getElementById('imageInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('runBtn').onclick = () => {
            const w = canvas.width, h = canvas.height;
            
            // 1. 보라색 선 자동 연장 로직
            const imgData = ctx.getImageData(0, 0, w, h);
            const data = imgData.data;
            let sx=0, sy=0, sxy=0, sx2=0, n=0;
            for(let i=0; i<data.length; i+=4) {
                if(data[i] > 100 && data[i+2] > 100 && data[i+1] < 150) {
                    let x = (i/4)%w, y = Math.floor((i/4)/w);
                    sx+=x; sy+=y; sxy+=x*y; sx2+=x*x; n++;
                }
            }
            if(n > 50) {
                let m = (n*sxy - sx*sy) / (n*sx2 - sx*sx);
                let b = (sy - m*sx)/n;
                ctx.strokeStyle = 'purple'; ctx.lineWidth = 10;
                ctx.beginPath(); ctx.moveTo(0, b); ctx.lineTo(w, m*w + b); ctx.stroke();
            }

            // 2. 이동 가능 공간(Walkable) 맵 만들기
            const finalData = ctx.getImageData(0, 0, w, h).data;
            const walkable = new Uint8Array(w*h);
            for(let i=0; i<finalData.length; i+=4) {
                // 검은색(벽) or 보라색(연장된 구획선)이면 0
                if((finalData[i]<80 && finalData[i+1]<80 && finalData[i+2]<80) || 
                   (finalData[i]>100 && finalData[i+2]>100 && finalData[i+1]<180)) walkable[i/4] = 0;
                else walkable[i/4] = 1;
            }

            // 3. 최적화 및 배치
            const k = parseInt(document.getElementById('aedCount').value);
            let centers = Array.from({length:k}, () => ({x: Math.random()*w, y: Math.random()*h}));
            
            for(let iter=0; iter<15; iter++) {
                let clusters = Array.from({length:k}, () => ({x:0, y:0, n:0}));
                for(let x=0; x<w; x+=15) {
                    for(let y=0; y<h; y+=15) {
                        if(!walkable[y*w+x]) continue;
                        let bestC = 0, minDist = Infinity;
                        for(let c=0; c<k; c++) {
                            let d = Math.hypot(x-centers[c].x, y-centers[c].y);
                            if(d < minDist) { minDist = d; bestC = c; }
                        }
                        clusters[bestC].x += x; clusters[bestC].y += y; clusters[bestC].n++;
                    }
                }
                centers = clusters.map(c => c.n > 0 ? {x: c.x/c.n, y: c.y/c.n} : centers[0]);
            }

            // 4. 결과 출력
            ctx.fillStyle = 'red';
            centers.forEach(c => {
                let rx = Math.floor(c.x), ry = Math.floor(c.y);
                // 실내로 보정
                while(!walkable[ry*w+rx] && rx < w) rx++;
                ctx.beginPath(); ctx.arc(rx, ry, 20, 0, Math.PI*2); ctx.fill();
            });
            alert("분석 및 공간 구획 완료! 빨간 원이 AED 최적 설치 위치입니다.");
        };
    </script>
</body>
</html>
